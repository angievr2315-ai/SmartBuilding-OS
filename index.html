<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartBuilding OS - Simulador</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        .sensor { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 8px; text-align: left; position: relative; }
        .dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; right: 15px; top: 20px; background: #34a853; }
        .alerta .dot { background: #d93025; box-shadow: 0 0 8px #d93025; }
        #dashboard { display: none; }
        .log { background: #202124; color: #34a853; font-family: monospace; font-size: 11px; padding: 10px; height: 80px; overflow-y: auto; text-align: left; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login">
            <h2 style="color:#1a73e8">Acceso SmartBuilding</h2>
            <input type="text" id="user" value="admin@poli.co">
            <input type="password" id="pass" value="Poli2026*">
            <p id="msg" style="color:red; display:none; font-size:12px">Contraseña incorrecta</p>
            <button onclick="entrar()">Iniciar Sesión</button>
        </div>

        <div id="dashboard">
            <h2 style="color:#1a73e8">Dashboard</h2>
            <div class="sensor">
                <strong>Temp - Piso 3</strong><br>
                <span id="t-val">22.5</span>°C
                <div id="t-dot" class="dot"></div>
            </div>
            <button id="luz-btn" style="background:#fbbc04; color:black" onclick="toggleLuz()">Encender Luz</button>
            <p style="font-size:10px; margin-top:15px">Inyección JSON en tiempo real:</p>
            <div id="logs" class="log">> Sistema iniciado...</div>
        </div>
    </div>

    <script>
        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin@poli.co" && p === "Poli2026*") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                iniciar();
            } else {
                document.getElementById('msg').style.display = 'block';
            }
        }

        function iniciar() {
            setInterval(() => {
                const v = (Math.random() * (35 - 18) + 18).toFixed(1);
                document.getElementById('t-val').innerText = v;
                const dot = document.getElementById('t-dot');
                const log = document.getElementById('logs');
                let st = "normal";
                if(v > 30) {
                    dot.parentElement.classList.add('alerta');
                    st = "ALERTA";
                } else {
                    dot.parentElement.classList.remove('alerta');
                }
                log.innerHTML += `<br>> JSON: {"temp": ${v}, "status": "${st}"}`;
                log.scrollTop = log.scrollHeight;
            }, 3000);
        }

        function toggleLuz() {
            const btn = document.getElementById('luz-btn');
            const log = document.getElementById('logs');
            if(btn.innerText === "Encender Luz") {
                btn.innerText = "Apagar Luz";
                log.innerHTML += `<br>> [CMD]: Luces ON`;
            } else {
                btn.innerText = "Encender Luz";
                log.innerHTML += `<br>> [CMD]: Luces OFF`;
            }
        }
    </script>
</body>
</html>
